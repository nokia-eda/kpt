apiVersion: v1
kind: ConfigMap
metadata:
  name: init-script
  namespace: eda-system # kpt-set: ${EDA_GOGS_NAMESPACE}
data:
  init.sh: |
    #!/bin/bash
    declare -a REPOS=("customresources" "credentials" "usersettings" "apps" "catalog" "identity")
    # Number of seconds to wait for gogs to comeup
    MAX_RETRIES=30
    # MAX number of tries to create a repo
    MAX_RETRY_REPO_CREATION=10
    # Place the init marker in the persistent volume
    INIT_MARKER=/data/eda-git-init.done
    trap : TERM INT

    log() {
      echo "--> [$(date)] $@"
    }

    die() {
      echo "--> [$(date)] ERROR: $@"
      exit 1
    }

    USER_CONFIG=/var/run/eda/user-config
    USERNAME_FILE=/var/run/eda/user-config/username
    PASSWORD_FILE=/var/run/eda/user-config/password
    REPOSITORY_LOCATION=/data/git/gogs-repositories

    until [[ -d "${USER_CONFIG}" ]] do log "Waiting for "${USER_CONFIG}" to exist" && sleep 2s; done
    until [[ -f "${USERNAME_FILE}" ]] do log "Waiting for "${USERNAME_FILE}" to exist" && sleep 2s; done
    until [[ -f "${PASSWORD_FILE}" ]] do log "Waiting for "${PASSWORD_FILE}" to exist" && sleep 2s; done

    ADMIN_USER="$(cat "${USERNAME_FILE}" | base64 -d)"
    ADMIN_PASS="$(cat "${PASSWORD_FILE}" | base64 -d)"

    check_gogs() {
      curl -s localhost:3000 > /dev/null
      echo $?
    }

    create_repo_if_it_does_not_exist() {
        repo=$1
        repo_path="${REPOSITORY_LOCATION}/${ADMIN_USER}/${repo}.git"

        if [[ -d "${repo_path}" ]]; then
          log "$repo already exists at ${repo_path}"
          return
        fi

        created=0
        retry_count=0
        while [[ $retry_count -lt $MAX_RETRY_REPO_CREATION ]]; do
            log "Creating repository: ${repo}"
            curl \
                --fail-with-body \
                -X POST localhost:3000/api/v1/admin/users/${ADMIN_USER}/repos \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"${repo}\",\"description\":\"Repository storing saved ${repo}\",\"auto_init\":true,\"private\":true}" \
                --user "${ADMIN_USER}:${ADMIN_PASS}"
            exit_code=$?
            echo ""
            if [[ $exit_code -ne 0 ]]; then
                retry_count=$((retry_count+1))
                sleep 10s
                log "Could not create repo $repo - POST response $exit_code - retry_count $retry_count"
            else
                log "Created repo $repo - retry_count $retry_count"
                created=1
                break
            fi
        done
        if [[ $created -ne 1 ]]; then die "Could not create repo $repo - retry_count $retry_count - aborting"; fi
    }

    /app/gogs/docker/start.sh &
    RETRY_COUNT=0
    until [ $(check_gogs) -eq 0 ] || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
      log "Waiting for Gogs to start..."
      sleep 1
      let RETRY_COUNT=RETRY_COUNT+1
    done

    if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
      log "Gogs did not start in time. Exiting."
      exit 1
    fi

    if [[ ! -f "${INIT_MARKER}" ]] then
      log "Init marker at ${INIT_MARKER} not found, creating admin user"
      su - git -c "/app/gogs/gogs admin create-user --name ${ADMIN_USER} --password ${ADMIN_PASS} --admin --email ${ADMIN_USER}@git.eda.dev"
      touch "${INIT_MARKER}"
    else
      log "Existing init marker at ${INIT_MARKER} found, skipping creation of admin user"
    fi

    for repo in "${REPOS[@]}"; do
        create_repo_if_it_does_not_exist "$repo"
    done

    log "Done init, sleeping to infinity and beyond"
    sleep infinity & wait
