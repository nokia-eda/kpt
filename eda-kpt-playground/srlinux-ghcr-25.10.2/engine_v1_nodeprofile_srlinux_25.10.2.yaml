apiVersion: core.eda.nokia.com/v1
kind: NodeProfile
metadata:
  name: srlinux-ghcr-25.10.2
  namespace: eda # kpt-set: ${EDA_USER_NAMESPACE}
  labels:
    eda.nokia.com/bootstrap: "true"
spec:
  nodeUser: admin
  operatingSystem: srl
  port: 57400
  version: 25.10.2
  versionPath: .system.information.version
  versionMatch: v25\.10\.2.*
  yang: https://eda-asvr.eda-system.svc/eda-system/schemaprofiles/srlinux-ghcr-25.10.2/srlinux-25.10.2.zip # kpt-set: https://eda-asvr.${EDA_CORE_NAMESPACE}.svc/${EDA_CORE_NAMESPACE}/schemaprofiles/srlinux-ghcr-25.10.2/srlinux-25.10.2.zip
  llmDb: https://eda-asvr.eda-system.svc/eda-system/llm-dbs/llm-db-srlinux-ghcr-25.10.2/llm-embeddings-srl-25-10-2.tar.gz # kpt-set: https://eda-asvr.${EDA_CORE_NAMESPACE}.svc/${EDA_CORE_NAMESPACE}/llm-dbs/llm-db-srlinux-ghcr-25.10.2/llm-embeddings-srl-25-10-2.tar.gz
  dhcp:
    managementPoolv4: 'ipv4-mgmt-pool'
    dhcp4Options:
    - option: 6-DomainNameServer
      value:
      - 128.251.10.125
  license: cx-srl-25-10-2-ghcr-license
  images:
  - image: default/srlimages/srlinux-25.10.2-527
    imageMd5: default/srlimages/srlinux-25.10.2-527-md5
  containerImage: ghcr.io/nokia/srlinux:25.10.2-527 # kpt-set: ${SRL_25_10_2_GHCR}
  imagePullSecret: core # kpt-set: ${CORE_IMG_CREDENTIALS}
