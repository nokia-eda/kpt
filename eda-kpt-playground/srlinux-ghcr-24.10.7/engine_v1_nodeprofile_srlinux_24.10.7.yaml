apiVersion: core.eda.nokia.com/v1
kind: NodeProfile
metadata:
  name: srlinux-ghcr-24.10.7
  namespace: eda # kpt-set: ${EDA_USER_NAMESPACE}
  labels:
    eda.nokia.com/bootstrap: "true"
spec:
  nodeUser: admin
  operatingSystem: srl
  port: 57400
  version: 24.10.7
  versionPath: .system.information.version
  versionMatch: v24\.10\.7.*
  yang: https://eda-asvr.eda-system.svc/_base_/schemaprofiles/srlinux-ghcr-24.10.7/srlinux-24.10.7.zip # kpt-set: https://eda-asvr.${EDA_CORE_NAMESPACE}.svc/_base_/schemaprofiles/srlinux-ghcr-24.10.7/srlinux-24.10.7.zip
  llmDb: https://eda-asvr.eda-system.svc/_base_/llm-dbs/llm-db-srlinux-ghcr-24.10.7/llm-embeddings-srl-24-10-7.tar.gz # kpt-set: https://eda-asvr.${EDA_CORE_NAMESPACE}.svc/_base_/llm-dbs/llm-db-srlinux-ghcr-24.10.7/llm-embeddings-srl-24-10-7.tar.gz
  dhcp:
    managementPoolv4: 'ipv4-mgmt-pool'
    dhcp4Options:
    - option: 6-DomainNameServer
      value:
      - 128.251.10.125
  license: cx-srl-24-10-7-ghcr-license
  images:
  - image: _base_/srlimages/srlinux-24.10.7-191
    imageMd5: _base_/srlimages/srlinux-24.10.7-191-md5
  containerImage: ghcr.io/nokia/srlinux:24.10.7-191 # kpt-set: ${SRL_24_10_7_GHCR}
  imagePullSecret: core # kpt-set: ${CORE_IMG_CREDENTIALS}
