apiVersion: core.eda.nokia.com/v1
kind: NodeProfile
metadata:
  name: srlinux-ghcr-26.3.1
  namespace: eda # kpt-set: ${EDA_USER_NAMESPACE}
  labels:
    eda.nokia.com/bootstrap: "true"
spec:
  nodeUser: admin
  operatingSystem: srl
  port: 57400
  version: 26.3.1
  versionPath: .system.information.version
  versionMatch: v26\.3\.1.*
  yang: https://eda-asvr.eda-system.svc/_base_/schemaprofiles/srlinux-ghcr-26.3.1/srlinux-26.3.1.zip # kpt-set: https://eda-asvr.${EDA_CORE_NAMESPACE}.svc/_base_/schemaprofiles/srlinux-ghcr-26.3.1/srlinux-26.3.1.zip
  llmDb: https://eda-asvr.eda-system.svc/_base_/llm-dbs/llm-db-srlinux-ghcr-26.3.1/llm-embeddings-srl-26-3-1.tar.gz # kpt-set: https://eda-asvr.${EDA_CORE_NAMESPACE}.svc/_base_/llm-dbs/llm-db-srlinux-ghcr-26.3.1/llm-embeddings-srl-26-3-1.tar.gz
  dhcp:
    managementPoolv4: 'ipv4-mgmt-pool'
    dhcp4Options:
    - option: 6-DomainNameServer
      value:
      - 128.251.10.125
  license: cx-srl-26-3-1-ghcr-license
  images:
  - image: _base_/srlimages/srlinux-26.3.1-410
    imageMd5: _base_/srlimages/srlinux-26.3.1-410-md5
  containerImage: ghcr.io/nokia/srlinux:26.3.1-410 # kpt-set: ${SRL_26_3_1_GHCR}
  imagePullSecret: core # kpt-set: ${CORE_IMG_CREDENTIALS}
